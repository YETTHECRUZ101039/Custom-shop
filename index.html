<!DOCTYPE html>
<html>
<head>
  <title>Custom Keychain Shop</title>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>
  <style>
    body { font-family: Arial; max-width: 500px; margin: auto; }
    input, select, button { width: 100%; margin: 8px 0; padding: 8px; }
    .preview {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px;
      color: white;
      font-weight: bold;
    }
    button { background: black; color: white; border: none; }
  </style>
</head>
<body>

<h2>Customize Your Order</h2>

<select id="product">
  <option value="50">Cat Keychain - ₱50</option>
  <option value="60">Heart Clicker - ₱60</option>
  <option value="40">Name Keychain - ₱40</option>
</select>

<input type="color" id="colorPicker">

<input type="text" id="customText" placeholder="Custom text (if applicable)">

<input type="number" id="quantity" value="1" min="1">

<div class="preview" id="previewBox">Preview</div>

<h3>Total: ₱<span id="total">50</span></h3>

<hr>

<h3>Your Details</h3>
<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="address" placeholder="Delivery Address">

<button onclick="sendOrder()">Place Order</button>

<script>
  emailjs.init("9eV7HLW1GFZFrzLlo"); // replace this

  const product = document.getElementById("product");
  const quantity = document.getElementById("quantity");
  const total = document.getElementById("total");
  const preview = document.getElementById("previewBox");
  const colorPicker = document.getElementById("colorPicker");
  const customText = document.getElementById("customText");

  function updateTotal() {
    total.innerText = product.value * quantity.value;
  }

  product.addEventListener("change", updateTotal);
  quantity.addEventListener("input", updateTotal);

  colorPicker.addEventListener("input", () => {
    preview.style.backgroundColor = colorPicker.value;
  });

  customText.addEventListener("input", () => {
    preview.innerText = customText.value;
  });

  function sendOrder() {
    emailjs.send("tservice_w9np45c", "template_mo3hkih", {
      product: product.options[product.selectedIndex].text,
      color: colorPicker.value,
      text: customText.value,
      quantity: quantity.value,
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      phone: document.getElementById("phone").value,
      address: document.getElementById("address").value
    }).then(() => {
      alert("Order Sent Successfully!");
    }, () => {
      alert("Failed to send order.");
    });
  }

  updateTotal();
</script>

</body>
</html>
